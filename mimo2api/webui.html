<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimo2 控制面板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --bg-color: #F3F4F6;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-main: #111827;
            --text-muted: #6B7280;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            color: #1e1b4b;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-indicator {
            width: 14px;
            height: 14px;
            background: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10B981;
            animation: pulse 2s infinite;
        }

        .status-indicator.offline {
            background: #EF4444;
            box-shadow: 0 0 10px #EF4444;
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-text {
            font-size: 18px;
            font-weight: 500;
        }

        .status-subtext {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        
        .btn-danger { background: white; color: var(--danger); border: 1px solid #fca5a5; }
        .btn-danger:hover { background: #fef2f2; color: var(--danger-hover); border-color: #f87171; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: rgba(255, 255, 255, 0.5);
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        th {
            background: rgba(243, 244, 246, 0.5);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 14px;
            color: #374151;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-title { margin: 0 0 16px 0; font-size: 20px; font-weight: 600; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            resize: vertical;
            min-height: 100px;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4;}
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-outline { background: transparent; border: 1px solid #D1D5DB; color: #4B5563; }
        .btn-outline:hover { background: #F3F4F6; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
            font-size: 14px;
            font-weight: 500;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); color: var(--danger); }
        .toast.success { border-left-color: #10B981; color: #047857; }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mimo2 Center</h1>
        </div>

        <!-- 状态卡片 -->
        <div class="glass-card">
            <div>
                <div class="status-container">
                    <div id="statusIndicator" class="status-indicator"></div>
                    <div>
                        <div class="status-text">网关运行中</div>
                        <div class="status-subtext" id="statusText">正在获取实时数据...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户管理卡片 -->
        <div class="glass-card">
            <div class="flex-between">
                <h2 style="margin: 0; font-size: 18px;">Claw 运行账号管理</h2>
                <button class="btn" onclick="openModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    导入凭证
                </button>
            </div>
            
            <div class="table-wrapper">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>用户 ID (User ID)</th>
                            <th>备注名</th>
                            <th>ServiceToken 状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <h3 class="modal-title">导入 Xiaomi 凭证</h3>
            <div class="form-group">
                <label class="form-label">Cookie / 凭证数据字符串</label>
                <textarea id="cookieInput" class="form-control" placeholder='例如: serviceToken="vjQ..."; userId=686621...; xiaomichatbot_ph="6vv..."'></textarea>
                <div class="form-hint">支持自动解析多格式文本，需至少包含 <code>userId</code>, <code>serviceToken</code> 及 <code>xiaomichatbot_ph</code>。系统会自动提取值。</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn" onclick="submitImport()">确认导入</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // 核心逻辑
        let statusInterval;

        function showToast(msg, type='success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast show ${type}`;
            setTimeout(() => { el.className = `toast ${type}`; }, 3000);
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/system/status');
                const data = await res.json();
                const indicator = document.getElementById('statusIndicator');
                const text = document.getElementById('statusText');
                
                if (data.active_clients > 0) {
                    indicator.className = 'status-indicator';
                    text.textContent = `内网通信节点保持连接: ${data.active_clients} 个`;
                } else {
                    indicator.className = 'status-indicator offline';
                    text.textContent = `危险！没有任何一个内网节点在线，所有 API 请求将被退回`;
                }
            } catch(e) {
                document.getElementById('statusIndicator').className = 'status-indicator offline';
                document.getElementById('statusText').textContent = '后端连接失败';
            }
        }

        async function fetchUsers() {
            try {
                const res = await fetch('/api/users/list');
                const data = await res.json();
                const tbody = document.getElementById('usersBody');
                
                if (data.users && data.users.length > 0) {
                    tbody.innerHTML = data.users.map(u => `
                        <tr>
                            <td><strong style="color:var(--primary)">${u.userId}</strong></td>
                            <td>${u.name || '(未命名)'}</td>
                            <td>
                                <span style="display:inline-block; max-width: 150px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color: var(--text-muted);">
                                    ${u.serviceToken ? u.serviceToken.substring(0,10)+'...' : '无效'}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteUser('${u.userId}')">删除配置</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">当前未加载任何凭证</td></tr>';
                }
            } catch(e) {
                console.error("加载用户列表失败", e);
            }
        }

        async function deleteUser(uid) {
            if(!confirm(`确定要移除账号 ${uid} 吗？\n删除后下一次轮换将不再拉起该账号的请求。`)) return;
            try {
                const res = await fetch(`/api/users/delete/${uid}`, {method: 'DELETE'});
                if(res.ok) {
                    showToast('删除成功');
                    fetchUsers();
                } else {
                    showToast('删除失败: '+ (await res.text()), 'error');
                }
            } catch(e) {
                showToast('网络请求异常', 'error');
            }
        }

        function openModal() {
            document.getElementById('cookieInput').value = '';
            document.getElementById('importModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('importModal').classList.remove('active');
        }

        async function submitImport() {
            const val = document.getElementById('cookieInput').value;
            if(!val.trim()) {
                showToast('输入不能为空', 'error'); return;
            }

            try {
                const res = await fetch('/api/users/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ raw_text: val })
                });
                
                const data = await res.json();
                if(res.ok) {
                    showToast(`成功提取并存入 userId: ${data.userId}`);
                    closeModal();
                    fetchUsers();
                } else {
                    showToast(data.detail || '解析缺少必要字段', 'error');
                }
            } catch(e) {
                showToast('提交异常', 'error');
            }
        }

        // 初始化
        fetchStatus();
        fetchUsers();
        statusInterval = setInterval(fetchStatus, 3000); // 实时刷新核心网关节点状态

    </script>
</body>
</html>
